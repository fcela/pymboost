title: pymboost
author: pymboost contributors
only_build_toc_files: true
execute:
  execute_notebooks: force
  timeout: 300
  allow_errors: false
parse:
  myst_enable_extensions:
    - amsmath
    - colon_fence
    - deflist
    - dollarmath
    - linkify
    - substitution
    - tasklist
html:
  use_issues_button: false
  use_repository_button: false
  home_page_in_navbar: true
sphinx:
  config:
    myst_heading_anchors: 3
    suppress_warnings:
      - myst.header
